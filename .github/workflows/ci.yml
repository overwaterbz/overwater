name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - run: npm run lint

      - run: npm run test:ci

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          GROK_API_KEY: placeholder
          MARKETING_API_KEY: placeholder

      - name: Lighthouse CI
        run: |
          npm i -g @lhci/cli@0.14.x
          lhci autorun --collect.staticDistDir=.next --collect.url=http://localhost:3000 || true
        continue-on-error: true
